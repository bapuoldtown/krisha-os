name: Lesson 2 — First Boot 🦚

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  boot-krisha:
    name: Build & Boot Krisha in QEMU
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Install Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-04-15
          components: rust-src, llvm-tools-preview

      - name: 💾 Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lesson2-v4-${{ hashFiles('**/Cargo.toml') }}

      - name: 🖥️ Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: 📦 Install bootimage
        run: cargo install bootimage --version 0.10.3

      - name: 🔨 Build Krisha kernel
        run: cargo build --verbose

      - name: 💿 Create bootable disk image
        run: cargo bootimage

      - name: 📋 Show what was built
        run: |
          echo "=== Build artifacts ==="
          ls -la target/x86_64-krisha/debug/ || echo "No debug folder"
          echo ""
          echo "=== Bootable image ==="
          ls -la target/x86_64-krisha/debug/bootimage-krisha-kernel.bin || echo "No boot image"

      - name: 🚀 Boot Krisha in QEMU
        run: |
          echo "════════════════════════════════════════"
          echo "  🦚 BOOTING KRISHA OS IN QEMU 🦚"
          echo "════════════════════════════════════════"
          echo ""
          timeout 5s qemu-system-x86_64 \
            -drive format=raw,file=target/x86_64-krisha/debug/bootimage-krisha-kernel.bin \
            -display none \
            -serial stdio \
            -no-reboot \
            > qemu-output.log 2>&1 || true
          echo "=== QEMU output ==="
          cat qemu-output.log
          echo ""
          echo "════════════════════════════════════════"
          echo "  ✅ Krisha boot test complete"
          echo "════════════════════════════════════════"

      - name: 🦚 Celebrate
        run: |
          echo ""
          echo "  ╔══════════════════════════════════════╗"
          echo "  ║                                      ║"
          echo "  ║   🦚 KRISHA OS BOOTED! 🦚            ║"
          echo "  ║                                      ║"
          echo "  ║   Day 1 of forever.                  ║"
          echo "  ║   Intelligence, by grace.            ║"
          echo "  ║                                      ║"
          echo "  ╚══════════════════════════════════════╝"