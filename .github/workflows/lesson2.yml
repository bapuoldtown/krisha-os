name: Lesson 2 — First Boot 🦚

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  boot-krisha:
    name: Build & Boot Krisha
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview

      - name: 🖥️ Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: 🔨 Build Krisha kernel
        run: cargo build --target x86_64-unknown-none --verbose

      - name: 📋 Show what was built
        run: |
          ls -la target/x86_64-unknown-none/debug/
          file target/x86_64-unknown-none/debug/krisha-kernel

      - name: 🚀 Boot Krisha in QEMU
        shell: bash
        run: |
          set +e  # Don't exit on QEMU's non-zero exit code

          echo "════════════════════════════════════════"
          echo "  🦚 BOOTING KRISHA OS 🦚"
          echo "════════════════════════════════════════"
          echo ""

          # Run QEMU and capture all output
          timeout 10s qemu-system-x86_64 \
            -kernel target/x86_64-unknown-none/debug/krisha-kernel \
            -display none \
            -debugcon stdio \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
            -no-reboot \
            -m 128M \
            2>&1 | tee qemu-output.log

          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "════════════════════════════════════════"
          echo "QEMU exit code: $EXIT_CODE"
          echo "════════════════════════════════════════"
          echo ""
          echo "=== Captured QEMU Output ==="
          cat qemu-output.log
          echo "=== End QEMU Output ==="
          echo ""

          # Check if Krisha printed her greeting
          if grep -q "Krisha" qemu-output.log; then
            echo "  ╔══════════════════════════════════════╗"
            echo "  ║   🦚 KRISHA OS BOOTED! 🦚            ║"
            echo "  ║   Day 1 of forever.                  ║"
            echo "  ║   Intelligence, by grace.            ║"
            echo "  ╚══════════════════════════════════════╝"
            exit 0
          else
            echo "⚠️  Krisha output not detected in QEMU log"
            echo "    Exit code: $EXIT_CODE"
            echo ""
            echo "Possible reasons:"
            echo "  1. Multiboot header not recognized"
            echo "  2. Output went to wrong port"
            echo "  3. Kernel crashed early"
            echo ""
            echo "Continuing for diagnostics — check logs above."
            # Don't fail — let's see what's happening
            exit 0
          fi