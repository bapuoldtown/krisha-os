name: Lesson 2 — First Boot 🦚

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  boot-krisha:
    name: Build & Boot Krisha
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview

      - name: 🖥️ Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: 🔨 Build Krisha kernel
        run: cargo build --target x86_64-unknown-none --verbose

      - name: 📋 Show what was built
        run: |
          ls -la target/x86_64-unknown-none/debug/
          file target/x86_64-unknown-none/debug/krisha-kernel

      - name: 🚀 Boot Krisha in QEMU
        run: |
          echo "════════════════════════════════════════"
          echo "  🦚 BOOTING KRISHA OS 🦚"
          echo "════════════════════════════════════════"
          
          timeout 5s qemu-system-x86_64 \
            -kernel target/x86_64-unknown-none/debug/krisha-kernel \
            -display none \
            -debugcon stdio \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
            -no-reboot \
            > qemu-output.log 2>&1
          
          EXIT_CODE=$?
          echo ""
          echo "=== QEMU Output ==="
          cat qemu-output.log
          echo ""
          echo "QEMU exit code: $EXIT_CODE"
          
          # QEMU exit code 33 means success (our 0x10 << 1 | 1)
          if grep -q "Krisha OS" qemu-output.log; then
            echo ""
            echo "  ╔══════════════════════════════════════╗"
            echo "  ║   🦚 KRISHA OS BOOTED! 🦚            ║"
            echo "  ║   Day 1 of forever.                  ║"
            echo "  ║   Intelligence, by grace.            ║"
            echo "  ╚══════════════════════════════════════╝"
            exit 0
          else
            echo "❌ Krisha did not print expected output"
            exit 1
          fi